<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Márgenes SIICL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div id="loadingText" class="loading-text">Cargando datos...</div>
</div>

<div id="errorBanner" class="error-banner" style="display:none"></div>

<div class="header">
  <div class="logo-mark">
    <svg width="40" height="28" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 32C8 32 14 8 22 8C26 8 24 20 28 20C32 20 30 8 34 8C42 8 36 32 36 32" stroke="#1b5fa8" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M36 12C40 8 48 6 52 10C56 14 50 20 46 18" stroke="#1b5fa8" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <h1>Panel de Márgenes</h1>
  <div class="sep"></div>
  <span class="subtitle">Gestión y seguimiento de márgenes por actividad</span>
  <div class="right-info"><span class="fy-badge" id="fyBadge"></span></div>
</div>

<div class="filters-bar">
  <div class="filter-group" style="flex-grow:1;max-width:300px">
    <label>Buscar Actividad</label>
    <div class="search-wrap">
      <input type="text" id="filterSearch" placeholder="Código o descripción…">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8896a6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
  <div class="filter-group"><label>Año Fiscal</label><select id="filterFY"></select></div>
  <div class="filter-group"><label>BU</label><select id="filterBU"><option value="">Todas</option></select></div>
  <div class="filter-group"><label>Tipo-AT</label><select id="filterTipoAT"><option value="">Todas</option></select></div>
  <div class="filter-group"><label>Customer</label><select id="filterCustomer"><option value="">Todas</option></select></div>
  <div class="filter-group"><label>Jefatura</label><select id="filterJefatura"><option value="">Todas</option></select></div>
  <div class="filter-group"><label>Mes Detalle</label><select id="filterMonth"></select></div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <div class="filter-check">
      <input type="checkbox" id="filterProdPos">
      <span onclick="document.getElementById('filterProdPos').click()">Prod &gt; 0</span>
    </div>
    <div class="filter-check" style="margin-top:4px">
      <input type="checkbox" id="filterProd1M">
      <span onclick="document.getElementById('filterProd1M').click()">Prod &gt; 1M</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('resumen')">Resumen</div>
    <div class="tab" onclick="switchTab('detalle')">Detalle</div>
  </div>
  <div id="tabResumen">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="card">
      <div class="card-title"><span class="ta">●</span> Actividades por Rango de Margen — Evolución Mensual</div>
      <div class="legend" id="legend"></div>
      <div class="chart-container"><canvas id="stackedChart"></canvas></div>
    </div>
    <div class="bottom-grid">
      <div class="card">
        <div class="card-title"><span class="ta">●</span> Distribución Mes Seleccionado</div>
        <div class="horiz-chart-container"><canvas id="horizChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="ta">●</span> Detalle Actividades — <span id="detailMonthLabel" style="color:var(--accent)"></span></div>
        <div class="table-wrap" id="tableWrap"></div>
      </div>
    </div>
  </div>
  <div id="tabDetalle" style="display:none">
    <div class="card">
      <div class="card-title"><span class="ta">●</span> Margen Histórico por Actividad</div>
      <div class="table-wrap" id="detalleTableWrap" style="max-height:700px"></div>
    </div>
  </div>
</div>

<div id="hoverTip" style="display:none;position:fixed;z-index:999;background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;box-shadow:0 4px 16px rgba(0,0,0,0.12);pointer-events:none;max-width:400px;font-size:12px;color:var(--text)"></div>

<script src="app.js"></script>
</body>
</html>
